openapi:
  title: backend API
  version: 1.0.0
  description: API gerada automaticamente pelo Vaden.
  enable: true

drift:
  log_statements: true
postgres:
  host: 0.0.0.0
  database: postgres
  port: 5432
  username: username
  password: password
  ssl: disable
server:
  port: 8080
  host: localhost

storage:
  provider: local  # opções: local, s3, firebase
  local:
    folder: './uploads'
  s3:
    bucket: 'meu-bucket'
    region: 'us-east-1'
    accessKey: 'sua_access_key'
    secretKey: 'seu_secret_key'
  firebase:
    projectId: 'my-project'
    apiKey: 'my_api'

env:
  base_url: http://localhost
  mode: debug

security:
  secret: 'troque-este-segredo-em-producao'  # via env var em produção
  tokenValidity: 900        # 15 min, em segundos
  refreshTokenValidity: 604800   # 7 dias, em segundos
  issuer: dartisan
  # dart_jsonwebtoken exige lista não-vazia (Audience assert) — não deixar [].
  audiences: ['dartisan-api']

publish:
  max_tarball_size_bytes: 104857600  # 100 MiB, mesma ordem de grandeza do pub.dev